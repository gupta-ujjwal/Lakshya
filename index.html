<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect decoder — counterpart to public/404.html. When
      // Pages 404s on a deep link like /Lakshya/import, the 404
      // script redirects to /Lakshya/?/import and we run here to
      // restore the path before React mounts. Token is "?/" — must
      // match the encoder in public/404.html.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/pwa-64x64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lakshya" />
    <!--
      theme-color here is the browser-chrome tint and is media-conditional.
      Distinct from manifest theme_color in vite.config.ts (single value,
      drives OS splash + task-switcher) and globals.css design tokens
      (in-app surfaces). Three sites, three different roles — don't try
      to source them from one constant.
    -->
    <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <title>Lakshya | Study Tracker</title>
    <script>
      // Pre-hydration theme application — must run before React mounts to
      // prevent FOUC. Mirrors src/lib/theme-context.tsx; if you change the
      // localStorage key or resolution rule, update both. The recognized
      // values are "light" | "dark" | "system" (matching readStoredTheme
      // in theme-context.tsx); anything else falls through to the OS
      // preference, same as "system".
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var explicit = theme === "light" || theme === "dark";
          var resolved = explicit ? theme : (prefersDark ? "dark" : "light");
          if (resolved === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          // localStorage and matchMedia can throw in private mode or
          // sandboxed iframes. Theme is a paint hint, not state — drop
          // to the default light theme rather than blocking page load.
        }
      })();
    </script>
  </head>
  <body class="min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
