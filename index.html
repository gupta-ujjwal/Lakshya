<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/pwa-64x64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lakshya" />
    <!--
      theme-color here is the browser-chrome tint and is media-conditional.
      Distinct from manifest theme_color in vite.config.ts (single value,
      drives OS splash + task-switcher) and globals.css design tokens
      (in-app surfaces). Three sites, three different roles — don't try
      to source them from one constant.
    -->
    <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <title>Lakshya | Study Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Pre-hydration theme application — must run before React mounts to
      // prevent FOUC. Mirrors src/lib/theme-context.tsx; if you change the
      // localStorage key or resolution rule, update both. The recognized
      // values are "light" | "dark" | "system" (matching readStoredTheme
      // in theme-context.tsx); anything else falls through to the OS
      // preference, same as "system".
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var explicit = theme === "light" || theme === "dark";
          var resolved = explicit ? theme : (prefersDark ? "dark" : "light");
          if (resolved === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
