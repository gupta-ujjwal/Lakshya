<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lakshya</title>
    <script>
      // SPA redirect for GitHub Pages — encodes /<base>/path as
      // /<base>/?/path and replaces the URL so the SPA can decode it
      // back. Token is "?/" — the decoder script in index.html relies
      // on that exact prefix; keep them in sync.
      // https://github.com/rafgraph/spa-github-pages
      //
      // pathSegmentsToKeep = 1 matches the project-site deploy
      // (https://<user>.github.io/<repo>/...). For a custom domain or
      // user-page deploy where the app sits at the host root, set this
      // to 0 — VITE_BASE in CI mirrors that decision (/<repo>/ vs /).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
